# wrangler.toml — Cloudflare Workers + Static Assets, claude-books.brandon-behring.dev (hub).
#
# Combined-dist model: scripts/assemble-hub.mjs (run by the root `build`) builds each
# book into dist/<subroute>/ (/architect/, /design/, /agentic-coding/, /handbook/) plus a
# hub landing at dist/index.html. ONE Worker serves the whole apex — no per-book Workers,
# no service-binding proxy.
#
#   Build command:  npm run build
#   Deploy command: npx wrangler deploy
#   Node:           >=22.12 (Astro 6)

name = "claude-books"
compatibility_date = "2026-05-19"

[assets]
directory = "./dist"
