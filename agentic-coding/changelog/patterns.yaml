# changelog/patterns.yaml — Shared registry of agentic-coding patterns.
#
# Each entry names a pattern that one or more tools may adopt. The
# changelog/tools/*.yaml files reference these by `id`. The convergence
# dashboard (Stage 3) joins the two to produce per-pattern timelines:
# "when did each tool adopt this pattern?"
#
# convergence_date: null means not yet adopted by all three tools. A
# value means the date the last tool to adopt it landed the pattern —
# signals the pattern has crossed from open-design-space to stable.

- id: plan-mode
  name: "Plan mode"
  description: >-
    A read-only phase where the agent reads, analyzes, and proposes a plan
    without writing files. Mitigates premature action on unclear intent.
  category: safety
  convergence_date: 2026-03-05

- id: subagents
  name: "Subagent delegation"
  description: >-
    Spawning a child agent with its own context and tools to handle a
    bounded sub-task, returning a summary to the parent.
  category: scale
  convergence_date: null

- id: briefing-docs
  name: "Top-level briefing document"
  description: >-
    A conventional filename at the repo root (CLAUDE.md / GEMINI.md / AGENTS.md)
    where authors encode project context for stateless agents.
  category: context
  convergence_date: 2026-03-05
