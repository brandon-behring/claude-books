# sources/manifest.yaml — canonical index of every external source cited.
#
# Each entry is a single citable source. The `id` is a slug used as the
# citation key in chapter MDX (e.g. <Citation src="gwern-sidenote" />).
#
# The full Playwright capture of each source lives in sources/cache/<hash>/
# and is gitignored (for drift detection only — never published). Public-
# facing pages only render the metadata below plus the Perma.cc link.
#
# Tier scale:
#   T1-official        — vendor-official documentation or release notes
#   T2-release-notes   — release blog or changelog (less formal than docs)
#   T3-practitioner    — respected community writing with durable argument
#   T4-conjecture      — blog posts, tweets, or unverified claims
#
# Validation: see `sources` collection in src/content.config.ts.

