name: research-lint

on:
  push:
    branches: [main]
    paths:
      - 'docs/research/**'
      - '.github/workflows/research-lint.yml'
  pull_request:
    paths:
      - 'docs/research/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Research-cache lint (frontmatter + structure)
        run: python3 docs/research/.lint.py
      - name: Cross-reference + cert-task-area coverage check
        run: python3 docs/research/.crossref.py
