name: content-validate

on:
  push:
    branches: [main]
    paths:
      - 'handbook/src/content/**'
      - 'handbook/src/content.config.ts'
      - '.github/workflows/content-validate.yml'
  pull_request:
    paths:
      - 'handbook/src/content/**'
      - 'handbook/src/content.config.ts'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: book-scaffold validate
        run: npx book-scaffold validate --preset tools
        working-directory: handbook
