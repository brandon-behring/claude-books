# sources/manifest.yaml — captured sources for the tools-profile dashboard.
# Each entry is read by <SourceArchive> and the convergence page, and cited
# inline via <Citation src="id" /> (sidenote by default; as="inline" for in-sentence).
#
# Format: top-level YAML array of source objects. Each entry needs an
# explicit `id` (used as the citation key in <Citation src="id" />),
# plus the fields validated by the package's sourcesSchema:
#   - id: example-source
#     url: https://example.com
#     title: Example source
#     author: Author Name
#     publish_date: 2025-01-01        # unquoted — sourcesSchema uses z.date()
#     captured_at: 2026-05-19T00:00:00Z
#     tier: T1-official          # T1-official | T2-release-notes | T3-practitioner | T4-conjecture
#     tool: claude-code           # claude-code | gemini-cli | codex-cli | cross-tool
#
# NOTE (HITL per AUTHORS.md §"No final acceptance of any factual claim"): the
# entries below are provisional. URLs + publish dates need human verification
# against the primary sources before the citing chapter is promoted to validated.
#
# See https://github.com/brandon-behring/book-scaffold-astro/blob/v3.0/PACKAGE_DESIGN.md

